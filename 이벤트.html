<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바로그 월이벤트 생성기</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800&family=Noto+Sans+SC:wght@500;700;800&family=Noto+Sans+Thai:wght@500;700;800&display=swap');

        @font-face {
            font-family: 'GmarketSansMedium';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: normal; font-style: normal;
        }
        @font-face {
            font-family: 'GmarketSansBold';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        :root {
            --primary: #ff6985;
            --primary-hover: #e84d6c;
            --primary-light: rgba(255, 105, 133, 0.08);
            --accent: #ffcc00;
            --accent-hover: #e6b800;
            --bg: #f4f5f8;
            --card-bg: #ffffff;
            --text-main: #1e2432;
            --text-muted: #8a92a6;
            --border: #e4e8f0;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.07);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.13);
            --font: 'Pretendard', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans Thai', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 36px 20px;
        }

        /* ===== Layout ===== */
        .container {
            max-width: 1340px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 32px;
        }
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
        }

        /* ===== Section Header ===== */
        .app-header {
            margin-bottom: 28px;
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            border-left: 4px solid var(--primary);
            padding-left: 14px;
            line-height: 1.3;
        }
        .app-header p {
            margin-top: 6px;
            margin-left: 18px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ===== Card ===== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        /* ===== Form ===== */
        .section-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .form-group { margin-bottom: 16px; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label.field-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        label.field-label .tip {
            font-weight: 400;
            color: var(--primary);
            margin-left: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-main);
            background: #fafbfc;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,105,133,0.12);
            background: #fff;
        }

        .file-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            background: #fafbfc;
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.18s;
        }
        .file-label:hover { background: #f0f2f7; border-color: var(--primary); }
        .file-label.attached { background: #fff; border-color: var(--primary); color: var(--primary); border-style: solid; }
        .file-label .file-icon { font-size: 18px; }
        input[type="file"] { display: none; }

        /* ===== Banners Section ===== */
        .banners-section { margin-top: 24px; }

        .banner-card {
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .banner-card:focus-within {
            box-shadow: 0 0 0 3px rgba(255,105,133,0.12);
            border-color: var(--primary);
        }

        .banner-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--primary-light);
            border-bottom: 1.5px solid var(--border);
        }
        .banner-header .banner-index {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .banner-header input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            padding: 4px 6px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }
        .banner-header input[type="text"]:focus {
            box-shadow: none;
            outline: none;
        }
        .btn-del-banner {
            background: none;
            border: 1.5px solid #f0b3bb;
            color: var(--primary);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .btn-del-banner:hover { background: var(--primary); color: #fff; }

        /* ===== Item Rows ===== */
        .banner-items {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-row {
            display: grid;
            grid-template-columns: 1.6fr 0.7fr 0.9fr 0.85fr auto;
            gap: 8px;
            align-items: start;
        }

        .item-field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .item-field .field-tag {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .item-row textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-main);
            background: #fafbfc;
            resize: none;
            overflow: hidden;
            min-height: 36px;
            line-height: 1.5;
            transition: border-color 0.18s;
        }
        .item-row textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }
        .item-row input[type="text"] {
            padding: 8px 10px;
            font-size: 13px;
        }

        .capsule-input {
            padding: 8px 10px;
            background: #fff0f3;
            border-color: #f8c4cc !important;
            text-align: center;
            font-weight: 700;
            color: var(--primary);
        }
        .capsule-input:focus { border-color: var(--primary) !important; }

        .price-num-input {
            color: var(--primary);
            font-weight: 800;
            font-size: 14px !important;
        }

        .btn-del-item {
            background: none;
            border: none;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 4px;
            margin-top: 16px;
            line-height: 1;
            transition: color 0.15s;
        }
        .btn-del-item:hover { color: var(--primary); }

        /* Banner footer */
        .banner-footer {
            padding: 8px 14px 12px;
            display: flex;
        }
        .btn-add-item {
            background: none;
            border: 1.5px dashed #c0c9d8;
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            padding: 7px 14px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-add-item:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

        /* ===== Add Banner Button ===== */
        .btn-add-banner {
            width: 100%;
            padding: 12px;
            background: none;
            border: 2px dashed #c0c9d8;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.18s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add-banner:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* ===== Action Buttons ===== */
        .action-section { margin-top: 24px; }
        .btn-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn-project-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button { font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; }
        button:active { transform: scale(0.98); }

        .btn-generate {
            background: var(--accent);
            color: #000;
            border-radius: var(--radius-sm);
            padding: 15px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }
        .btn-generate:hover { background: var(--accent-hover); }

        .btn-download {
            background: var(--text-main);
            color: #fff;
            border-radius: var(--radius-sm);
            padding: 15px;
            font-size: 14px;
            font-weight: 700;
            display: none;
        }
        .btn-download:hover { opacity: 0.85; }

        .btn-project {
            background: #f4f5f8;
            color: var(--text-main);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px;
            font-size: 13px;
            font-weight: 700;
        }
        .btn-project:hover { background: #e9ecf2; }

        /* ===== Preview ===== */
        .preview-card {
            position: sticky;
            top: 36px;
            max-height: calc(100vh - 72px);
            display: flex;
            flex-direction: column;
        }
        .preview-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .preview-scroll {
            background: #dde1ea;
            border-radius: var(--radius);
            padding: 20px;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            flex: 1;
            min-height: 400px;
        }
        .preview-scroll img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18);
        }
        .preview-placeholder {
            color: #888;
            font-size: 14px;
            font-weight: 600;
            margin: auto;
            text-align: center;
            padding: 60px 20px;
            line-height: 2;
        }
        .preview-hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="container">

    <!-- ===== 입력 패널 ===== -->
    <div class="card">
        <div class="app-header">
            <h1>바로그 월이벤트 생성기</h1>
            <p>배너와 항목을 직접 입력해 이미지를 생성하세요</p>
        </div>

        <!-- 기본 정보 -->
        <div class="section-label">📋 기본 정보</div>

        <div class="form-row">
            <div class="form-group">
                <label class="field-label" for="topTitle">상단 제목 <span class="tip">공란 시 생략</span></label>
                <input type="text" id="topTitle" value="바로그 구미점 4월 이벤트">
            </div>
            <div class="form-group">
                <label class="field-label" for="topDate">이벤트 기간 <span class="tip">공란 시 생략</span></label>
                <input type="text" id="topDate" value="2026.04.01 - 2026.04.30">
            </div>
        </div>

        <div class="form-group">
            <label class="field-label" for="botText">하단 문구 <span class="tip">외국어 제작 시 해당 언어로 수정</span></label>
            <input type="text" id="botText" value="부가세별도">
        </div>

        <div class="form-group">
            <label class="field-label">배경 이미지</label>
            <label for="bgInput" class="file-label" id="fileLabel">
                <span class="file-icon">🖼️</span>
                <span id="fileLabelText">배경 이미지 파일을 선택하세요</span>
            </label>
            <input type="file" id="bgInput" accept="image/*">
        </div>

        <!-- 배너 섹션 -->
        <div class="banners-section">
            <div class="section-label">🏷️ 배너 및 항목 관리</div>
            <div id="bannersContainer"></div>

            <button class="btn-add-banner" onclick="addBanner()">
                <span>➕</span> 배너 추가
            </button>
        </div>

        <!-- 액션 버튼 -->
        <div class="action-section">
            <div class="btn-row">
                <button class="btn-generate" onclick="generateImages()">⚡ 생성하기 (Ctrl+S)</button>
                <button class="btn-download" id="downloadBtn" onclick="downloadAllImages()">⬇ 전체 다운로드</button>
            </div>
            <div class="btn-project-row">
                <button class="btn-project" onclick="saveProject()">💾 내용 백업 (저장)</button>
                <button class="btn-project" onclick="document.getElementById('projectInput').click()">📂 내용 불러오기</button>
                <input type="file" id="projectInput" accept=".json" style="display:none;" onchange="loadProject(event)">
            </div>
        </div>
    </div>

    <!-- ===== 미리보기 패널 ===== -->
    <div class="preview-card">
        <div class="preview-header">🖼 미리보기</div>
        <div class="preview-scroll" id="previewContainer">
            <div class="preview-placeholder" id="placeholder">
                배경 이미지를 선택한 뒤<br>
                배너와 항목을 입력하고<br>
                <strong>생성하기</strong>를 눌러주세요
            </div>
        </div>
        <p class="preview-hint">이미지가 여러 장일 경우 스크롤하여 확인하세요</p>
    </div>

</div>

<script>
    /* ========================================
       STATE
    ======================================== */
    /**
     * eventData structure:
     * [
     *   {
     *     title: "배너 제목",
     *     items: [
     *       { name: "항목명(줄바꿈 가능)", capsule: "단위 캡슐", priceNum: "강조 숫자", priceSuffix: "단위 텍스트" },
     *       ...
     *     ]
     *   },
     *   ...
     * ]
     */
    let eventData = [];
    let generatedImagesUrls = [];
    let cachedBgImg = null;
    let bannerCount = 0;

    const CONFIG = {
        width: 1000,
        height: 1000,
        fonts: {
            main: "'Pretendard', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans Thai', sans-serif",
            display: "'GmarketSansBold', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans Thai', sans-serif",
            displayMed: "'GmarketSansMedium', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans Thai', sans-serif"
        }
    };

    /* ========================================
       UI — 배너/항목 동적 생성
    ======================================== */
    function addBanner(bannerData = null) {
        bannerCount++;
        const id = bannerCount;
        const title = bannerData ? bannerData.title : `배너 ${id}`;

        const container = document.getElementById('bannersContainer');
        const card = document.createElement('div');
        card.className = 'banner-card';
        card.dataset.bannerId = id;

        card.innerHTML = `
            <div class="banner-header">
                <div class="banner-index">${id}</div>
                <input type="text" placeholder="배너 제목 (예: 필러 이벤트)" value="${escHtml(title)}" oninput="syncBannerTitle(${id}, this.value)">
                <button class="btn-del-banner" onclick="deleteBanner(${id})">❌ 삭제</button>
            </div>
            <div class="banner-items" id="items-${id}"></div>
            <div class="banner-footer">
                <button class="btn-add-item" onclick="addItem(${id})">➕ 항목 추가</button>
            </div>
        `;
        container.appendChild(card);

        // eventData에 배너 추가
        eventData.push({ id, title, items: [] });

        // 항목 복원 또는 기본 항목 1개 생성
        if (bannerData && bannerData.items && bannerData.items.length > 0) {
            bannerData.items.forEach(item => addItem(id, item));
        } else {
            addItem(id);
        }
    }

    function deleteBanner(id) {
        const allCards = document.querySelectorAll('.banner-card');
        if (allCards.length <= 1) {
            alert('최소 1개의 배너는 유지해야 합니다.');
            return;
        }
        const card = document.querySelector(`.banner-card[data-banner-id="${id}"]`);
        if (card) card.remove();
        eventData = eventData.filter(b => b.id !== id);
    }

    function syncBannerTitle(id, value) {
        const banner = eventData.find(b => b.id === id);
        if (banner) banner.title = value;
    }

    let itemCount = 0;
    function addItem(bannerId, itemData = null) {
        itemCount++;
        const iid = itemCount;
        const container = document.getElementById(`items-${bannerId}`);
        if (!container) return;

        const name      = itemData ? itemData.name       : '';
        const capsule   = itemData ? itemData.capsule     : '';
        const priceNum  = itemData ? itemData.priceNum    : '';
        const priceSuf  = itemData ? itemData.priceSuffix : '';

        const row = document.createElement('div');
        row.className = 'item-row';
        row.dataset.itemId = iid;
        row.dataset.bannerId = bannerId;

        row.innerHTML = `
            <div class="item-field">
                <span class="field-tag">항목명</span>
                <textarea rows="1" placeholder="예: 필러&#10;(줄바꿈 가능)" oninput="autoResize(this); syncItem(${bannerId},${iid},'name',this.value)">${escHtml(name)}</textarea>
            </div>
            <div class="item-field">
                <span class="field-tag">단위 캡슐</span>
                <input type="text" class="capsule-input" placeholder="예: 1cc" value="${escHtml(capsule)}" oninput="syncItem(${bannerId},${iid},'capsule',this.value)">
            </div>
            <div class="item-field">
                <span class="field-tag">강조 숫자</span>
                <input type="text" class="price-num-input" placeholder="예: 9" value="${escHtml(priceNum)}" oninput="syncItem(${bannerId},${iid},'priceNum',this.value)">
            </div>
            <div class="item-field">
                <span class="field-tag">단위 텍스트</span>
                <input type="text" placeholder="예: 만9천원" value="${escHtml(priceSuf)}" oninput="syncItem(${bannerId},${iid},'priceSuffix',this.value)">
            </div>
            <button class="btn-del-item" onclick="deleteItem(${bannerId},${iid})" title="삭제">✕</button>
        `;
        container.appendChild(row);

        // eventData에 항목 추가
        const banner = eventData.find(b => b.id === bannerId);
        if (banner) {
            banner.items.push({ iid, name, capsule, priceNum, priceSuffix: priceSuf });
        }

        // textarea 초기 높이 조정
        const ta = row.querySelector('textarea');
        if (ta) autoResize(ta);
    }

    function deleteItem(bannerId, iid) {
        const banner = eventData.find(b => b.id === bannerId);
        if (banner && banner.items.length <= 1) {
            alert('최소 1개의 항목은 유지해야 합니다.');
            return;
        }
        const row = document.querySelector(`.item-row[data-item-id="${iid}"]`);
        if (row) row.remove();
        if (banner) banner.items = banner.items.filter(it => it.iid !== iid);
    }

    function syncItem(bannerId, iid, field, value) {
        const banner = eventData.find(b => b.id === bannerId);
        if (!banner) return;
        const item = banner.items.find(it => it.iid === iid);
        if (item) item[field] = value;
    }

    function autoResize(ta) {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
    }

    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ========================================
       배경 이미지 캐싱
    ======================================== */
    document.getElementById('bgInput').addEventListener('change', function(e) {
        const fileLabel = document.getElementById('fileLabel');
        const labelText = document.getElementById('fileLabelText');
        if (e.target.files && e.target.files.length > 0) {
            const file = e.target.files[0];
            labelText.textContent = file.name;
            fileLabel.classList.add('attached');
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => { cachedBgImg = img; };
            };
            reader.readAsDataURL(file);
        } else {
            labelText.textContent = '배경 이미지 파일을 선택하세요';
            fileLabel.classList.remove('attached');
            cachedBgImg = null;
        }
    });

    /* ========================================
       JSON 백업 / 불러오기
    ======================================== */
    function saveProject() {
        const data = {
            version: 2,
            topTitle: document.getElementById('topTitle').value,
            topDate:  document.getElementById('topDate').value,
            botText:  document.getElementById('botText').value,
            banners: eventData.map(b => ({
                title: b.title,
                items: b.items.map(it => ({
                    name:         it.name,
                    capsule:      it.capsule,
                    priceNum:     it.priceNum,
                    priceSuffix:  it.priceSuffix
                }))
            }))
        };
        const str = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
        const a = document.createElement('a');
        a.setAttribute('href', str);
        a.setAttribute('download', `이벤트_백업_${Date.now()}.json`);
        document.body.appendChild(a); a.click(); a.remove();
    }

    function loadProject(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.version !== 2) {
                    alert('이 파일은 구버전 백업 파일입니다. 새 버전으로 다시 저장해 주세요.');
                    return;
                }
                // 기본 정보 복원
                document.getElementById('topTitle').value = data.topTitle || '';
                document.getElementById('topDate').value  = data.topDate  || '';
                document.getElementById('botText').value  = data.botText  || '';

                // 배너 초기화 후 복원
                document.getElementById('bannersContainer').innerHTML = '';
                eventData = [];
                bannerCount = 0; itemCount = 0;

                if (data.banners && data.banners.length > 0) {
                    data.banners.forEach(b => addBanner(b));
                } else {
                    addBanner();
                }
                alert('내용을 성공적으로 불러왔습니다!');
            } catch {
                alert('잘못된 백업 파일입니다.');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    /* ========================================
       이미지 생성
    ======================================== */
    async function generateImages() {
        if (!cachedBgImg) {
            alert('배경 이미지를 먼저 선택해주세요!');
            return;
        }
        const banners = eventData.filter(b => b.items.length > 0);
        if (banners.length === 0) {
            alert('최소 1개의 배너와 항목을 입력해주세요.');
            return;
        }

        await document.fonts.ready;

        const previewContainer = document.getElementById('previewContainer');
        previewContainer.innerHTML = '';
        generatedImagesUrls = [];

        const topTitle = document.getElementById('topTitle').value;
        const topDate  = document.getElementById('topDate').value;
        const botText  = document.getElementById('botText').value;

        banners.forEach(banner => {
            const dataUrl = drawSingleCanvas(cachedBgImg, banner, topTitle, topDate, botText);
            generatedImagesUrls.push(dataUrl);
            const img = document.createElement('img');
            img.src = dataUrl;
            previewContainer.appendChild(img);
        });

        document.getElementById('downloadBtn').style.display = 'block';
    }

    /* ========================================
       다운로드
    ======================================== */
    function downloadAllImages() {
        if (generatedImagesUrls.length === 0) return;
        if (generatedImagesUrls.length === 1) {
            const a = document.createElement('a');
            a.download = `event_${Date.now()}.jpg`;
            a.href = generatedImagesUrls[0];
            a.click();
        } else {
            const zip = new JSZip();
            generatedImagesUrls.forEach((url, i) => {
                const base64 = url.replace(/^data:image\/(png|jpeg);base64,/, '');
                zip.file(`event_${i + 1}.jpg`, base64, { base64: true });
            });
            zip.generateAsync({ type: 'blob' }).then(blob => {
                saveAs(blob, `이벤트패키지_${Date.now()}.zip`);
            });
        }
    }

    /* ========================================
       Canvas 렌더링
    ======================================== */

    // 글자 단위 줄바꿈 (wrapTextChar)
    function wrapTextChar(ctx, text, maxWidth) {
        const result = [];
        const paragraphs = String(text).split('\n');
        paragraphs.forEach(para => {
            let current = '';
            for (let i = 0; i < para.length; i++) {
                const ch = para[i];
                const test = current + ch;
                if (ctx.measureText(test).width > maxWidth && i > 0) {
                    result.push(current);
                    current = ch;
                } else {
                    current = test;
                }
            }
            result.push(current);
        });
        return result;
    }

    // 둥근 사각형
    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath(); ctx.fill();
    }

    /**
     * 단일 배너 → Canvas 렌더링
     * @param {HTMLImageElement} bgImg - 배경 이미지
     * @param {Object}           banner - { title, items: [{name, capsule, priceNum, priceSuffix}] }
     * @param {string}           topTitle
     * @param {string}           topDate
     * @param {string}           botText
     */
    function drawSingleCanvas(bgImg, banner, topTitle, topDate, botText) {
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        canvas.width  = CONFIG.width;
        canvas.height = CONFIG.height;

        const startX = 105, endX = 895;
        const unitPriceGap  = 25;  // 단위 캡슐~금액 간격
        const groupRowGap   = 50;  // 같은 그룹 내 행 간격
        const textLineGap   = 40;  // 항목명 줄 간격
        const whitePad      = 15;
        const itemHalf      = 24;
        const groupSep      = 65;  // 그룹 사이 여백

        /* ---- 1. 항목 전처리 (각 행의 레이아웃 관련 수치 계산) ---- */
        // items → groups (여기서는 각 item이 1개의 그룹)
        const groups = banner.items.map(it => ({ ...it }));

        // 가격 너비, 단위 캡슐 너비, 줄바꿈 계산
        ctx.letterSpacing = '0px';

        groups.forEach(g => {
            // --- 강조 숫자 너비
            ctx.font = `800 54px ${CONFIG.fonts.main}`;
            ctx.letterSpacing = '-3px';
            g._numW = ctx.measureText(g.priceNum || '').width;

            // --- 단위 텍스트 너비
            ctx.font = `700 32px ${CONFIG.fonts.main}`;
            ctx.letterSpacing = '-1px';
            g._sufW = ctx.measureText(g.priceSuffix || '').width;

            // 가격 전체 너비 = 강조숫자 + 단위텍스트 + 3px 간격
            g._totalPriceW = g._numW + g._sufW + (g._sufW > 0 ? 3 : 0);

            // --- 단위 캡슐 너비
            ctx.font = `800 27px ${CONFIG.fonts.main}`;
            ctx.letterSpacing = '0px';
            g._capsuleW = g.capsule ? ctx.measureText(g.capsule).width + 30 : 0;

            // --- 줄바꿈 기준 너비 계산
            const priceRightBound = endX - g._totalPriceW; // 가격 왼쪽 끝
            const capsuleRightBound = (g._capsuleW > 0)
                ? priceRightBound - unitPriceGap - g._capsuleW
                : priceRightBound;
            const maxTextW = capsuleRightBound - startX - 10;

            ctx.font = `700 27px ${CONFIG.fonts.main}`;
            ctx.letterSpacing = '-1px';
            g._lines = wrapTextChar(ctx, g.name || '', maxTextW);

            // 이 그룹의 총 높이 스팬 (행 1개이므로 줄 수 기준)
            g._heightSpan = Math.max(0, (g._lines.length - 1) * textLineGap);
        });

        /* ---- 2. 총 리스트 높이 계산 ---- */
        let totalListHeight = 0;
        groups.forEach((g, i) => {
            totalListHeight += g._heightSpan;
            if (i < groups.length - 1) totalListHeight += groupSep;
        });

        /* ---- 3. 배너 제목 줄바꿈 및 높이 계산 ---- */
        ctx.font = `49px ${CONFIG.fonts.display}`;
        ctx.letterSpacing = '-2px';
        const titleLines    = wrapTextChar(ctx, banner.title || '', 800);
        const titleLineH    = 58;
        const bannerH       = Math.max(95, titleLines.length * titleLineH + 30);
        const whiteBoxH     = whitePad + itemHalf + totalListHeight + itemHalf + whitePad;
        const totalBoxH     = bannerH + whiteBoxH;
        const boxStartY     = 500 - totalBoxH / 2;

        /* ---- 4. 배경 그리기 ---- */
        const imgRatio = bgImg.width / bgImg.height;
        ctx.drawImage(bgImg, 0, (1000 - 1000 / imgRatio) / 2, 1000, 1000 / imgRatio);

        /* ---- 5. 상단 제목 / 기간 ---- */
        ctx.textBaseline = 'alphabetic';
        ctx.textAlign    = 'center';
        ctx.fillStyle    = '#ff6985';
        ctx.font = `27px ${CONFIG.fonts.displayMed}`;
        ctx.letterSpacing = '-1px';
        if (topTitle) ctx.fillText(topTitle, 500, 80);
        if (topDate)  ctx.fillText(topDate,  500, 115);

        /* ---- 6. 배너 제목 박스 ---- */
        ctx.fillStyle = '#ff6985';
        ctx.fillRect(60, boxStartY, 880, bannerH);
        ctx.fillStyle = 'white';
        ctx.font = `49px ${CONFIG.fonts.display}`;
        ctx.letterSpacing = '-2px';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        const titleStartY = boxStartY + bannerH / 2 - ((titleLines.length - 1) * titleLineH) / 2;
        titleLines.forEach((line, i) => ctx.fillText(line, 500, titleStartY + i * titleLineH));

        /* ---- 7. 흰색 박스 ---- */
        const whiteTop = boxStartY + bannerH;
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillRect(60, whiteTop, 880, whiteBoxH);
        ctx.strokeStyle = '#ff6985'; ctx.lineWidth = 2;
        ctx.strokeRect(61, whiteTop, 878, whiteBoxH - 1);

        /* ---- 8. 항목 리스트 렌더링 ---- */
        ctx.textBaseline = 'middle';
        let curY = whiteTop + whitePad + itemHalf;

        groups.forEach((g, index) => {
            const centerY = curY + g._heightSpan / 2;

            /* 항목명 (좌측, 줄바꿈 적용) */
            ctx.textAlign = 'left';
            ctx.fillStyle = 'black';
            ctx.font = `700 27px ${CONFIG.fonts.main}`;
            ctx.letterSpacing = '-1px';
            const textStartY = centerY - ((g._lines.length - 1) * textLineGap) / 2;
            g._lines.forEach((line, li) => ctx.fillText(line, startX, textStartY + li * textLineGap));

            /* 가격 블록 우측 기준점 */
            const priceRightX = endX;

            /* 단위 캡슐 */
            if (g.capsule) {
                const capsuleRightX = priceRightX - g._totalPriceW - (g._totalPriceW > 0 ? unitPriceGap : 0);
                const capsuleLeftX  = capsuleRightX - g._capsuleW;
                ctx.fillStyle = '#ff6985';
                roundRect(ctx, capsuleLeftX, centerY - 24, g._capsuleW, 48, 14);
                ctx.textAlign = 'center'; ctx.fillStyle = 'white';
                ctx.font = `800 27px ${CONFIG.fonts.main}`;
                ctx.letterSpacing = '0px';
                ctx.fillText(g.capsule, capsuleLeftX + g._capsuleW / 2, centerY + 2);
            }

            /* 가격 (강조 숫자 + 단위 텍스트) — 분리 렌더링 */
            ctx.textBaseline = 'alphabetic';
            const baseY = centerY + 18;

            // 단위 텍스트 (우측 끝부터)
            if (g.priceSuffix) {
                ctx.font = `700 32px ${CONFIG.fonts.main}`;
                ctx.letterSpacing = '-1px';
                ctx.textAlign = 'right';
                ctx.fillStyle = 'black';
                ctx.fillText(g.priceSuffix, priceRightX, baseY);
            }

            // 강조 숫자 (단위 텍스트 왼쪽)
            if (g.priceNum) {
                ctx.font = `800 54px ${CONFIG.fonts.main}`;
                ctx.letterSpacing = '-3px';
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ff6985';
                // 단위 텍스트가 있으면 그만큼 왼쪽으로 이동, 3px 간격
                const numRightX = priceRightX - g._sufW - (g._sufW > 0 ? 3 : 0);
                ctx.fillText(g.priceNum, numRightX, baseY);
            }

            ctx.textBaseline = 'middle';

            /* 구분선 */
            if (index < groups.length - 1) {
                const lineY = curY + g._heightSpan + groupSep / 2;
                ctx.beginPath();
                ctx.moveTo(startX, lineY); ctx.lineTo(endX, lineY);
                ctx.strokeStyle = '#ff6985'; ctx.lineWidth = 1; ctx.stroke();
                curY = lineY + groupSep / 2;
            }
        });

        /* ---- 9. 하단 문구 ---- */
        ctx.textBaseline = 'alphabetic';
        ctx.textAlign    = 'center';
        ctx.fillStyle    = '#ff6985';
        ctx.font = `23px ${CONFIG.fonts.displayMed}`;
        ctx.letterSpacing = '0px';
        if (botText) ctx.fillText(botText, 500, 975);

        return canvas.toDataURL('image/jpeg', 0.95);
    }

    /* ========================================
       초기화 — 기본 배너 1개 생성
    ======================================== */
    (function init() {
        addBanner({
            title: '필러 이벤트',
            items: [
                { name: '필러',       capsule: '1cc',  priceNum: '70',  priceSuffix: '만원' },
                { name: '필러',       capsule: '3cc',  priceNum: '199', priceSuffix: '만원' },
                { name: '보톡스',     capsule: '1부위', priceNum: '10',  priceSuffix: '만원' },
                { name: 'v라인 보톡스', capsule: '',    priceNum: '29',  priceSuffix: '만원' }
            ]
        });
    })();

    /* ========================================
       단축키  Ctrl+S
    ======================================== */
    window.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            generateImages();
        }
    });
</script>
